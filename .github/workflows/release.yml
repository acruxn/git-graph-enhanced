name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            vscode_target: darwin-arm64
          - os: macos-15
            target: x86_64-apple-darwin
            vscode_target: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            vscode_target: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            vscode_target: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: cargo build --release --package git-graph-server --target ${{ matrix.target }}
      - run: npm ci
      - run: node esbuild.mjs --production
      - name: Copy binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/git-graph-server.exe dist/git-graph-server.exe
          else
            cp target/${{ matrix.target }}/release/git-graph-server dist/git-graph-server
            chmod +x dist/git-graph-server
          fi
      - name: Package vsix
        run: npx @vscode/vsce package --target ${{ matrix.vscode_target }}
      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vscode_target }}
          path: '*.vsix'

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.vsix
          generate_release_notes: true
